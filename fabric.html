<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>布料详情 - Chez Moi</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Header -->
<div class="header header-relative">
  <a class="back-btn" href="index.html">←</a>
  <div class="brand" style="padding-left: 28px;">
    <div class="brand-name" style="font-size: 22px;">Chez Moi</div>
    <div class="brand-sub">手织老土布 · 布料库</div>
  </div>
  <div class="fabric-id" id="fabricId"># BL-001</div>
</div>

<!-- Image Gallery -->
<div class="gallery">
  <div class="gallery-track" id="galleryTrack"></div>
  <div class="gallery-dots" id="galleryDots"></div>
</div>

<!-- Content -->
<div class="content">
  <h1 class="fabric-name" id="fabricName"></h1>
  <div class="fabric-origin" id="fabricOrigin"></div>

  <div class="tags" id="fabricTags"></div>

  <!-- Basic Info -->
  <div class="info-card">
    <div class="info-card-title">布料信息</div>
    <div class="info-grid">
      <div class="info-item">
        <span class="info-label">材质</span>
        <span class="info-value" id="infoMaterial"></span>
      </div>
      <div class="info-item">
        <span class="info-label">纹样</span>
        <span class="info-value" id="infoPattern"></span>
      </div>
      <div class="info-item">
        <span class="info-label">染色</span>
        <span class="info-value" id="infoDyeing"></span>
      </div>
      <div class="info-item">
        <span class="info-label">幅宽</span>
        <span class="info-value" id="infoWidth"></span>
      </div>
      <div class="info-item">
        <span class="info-label">厚度</span>
        <span class="info-value" id="infoThickness"></span>
      </div>
      <div class="info-item">
        <span class="info-label">产地</span>
        <span class="info-value" id="infoOrigin"></span>
      </div>
    </div>
  </div>

  <!-- Story -->
  <div class="story">
    <div class="info-card-title">布的故事</div>
    <p id="fabricStory"></p>
  </div>

  <!-- Uses -->
  <div class="info-card">
    <div class="info-card-title">适合用途</div>
    <div class="suitable-tags" id="fabricUses"></div>
  </div>

  <!-- Care -->
  <div class="info-card">
    <div class="info-card-title">洗护建议</div>
    <div class="info-grid">
      <div class="info-item full">
        <span class="info-value" id="fabricCare"></span>
      </div>
    </div>
    <div class="care-icons">
      <div class="care-icon">🫧</div>
      <div class="care-icon">🌡️</div>
      <div class="care-icon">☀️</div>
    </div>
  </div>

  <!-- Contact -->
  <div class="contact-section">
    <div class="contact-title">喜欢这块布？</div>
    <div class="contact-sub">定制咨询 · 了解更多</div>
    <div class="contact-buttons">
      <a class="contact-btn btn-wechat" href="#">💬 微信咨询</a>
      <a class="contact-btn btn-xhs" href="#">📕 小红书</a>
    </div>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  <div class="brand-footer">Chez Moi</div>
  <div>手织老土布 · 每一块都有故事</div>
</div>

<script src="js/app.js"></script>
<script>initDetailPage();</script>
</body>
</html>
