<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chez Moi · 手织老土布布料库</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="brand">
    <div class="brand-name">Chez Moi</div>
    <div class="brand-sub">手织老土布 · 布料库</div>
  </div>
  <div class="header-nav">
    <a href="index.html" class="active">选布</a>
    <a href="about.html">关于</a>
  </div>
</div>

<!-- Filter Bar -->
<div class="filter-bar">
  <div class="filter-scroll">
    <div class="filter-group">
      <button class="filter-btn" data-group="pattern" data-value="方格">方格</button>
      <button class="filter-btn" data-group="pattern" data-value="条纹">条纹</button>
      <button class="filter-btn" data-group="pattern" data-value="素色">素色</button>
      <button class="filter-btn" data-group="pattern" data-value="回纹">回纹</button>
      <button class="filter-btn" data-group="pattern" data-value="彩格">彩格</button>
    </div>
    <div class="filter-group">
      <button class="filter-btn" data-group="color" data-value="蓝">蓝</button>
      <button class="filter-btn" data-group="color" data-value="黄">黄</button>
      <button class="filter-btn" data-group="color" data-value="棕">棕</button>
      <button class="filter-btn" data-group="color" data-value="红">红</button>
      <button class="filter-btn" data-group="color" data-value="绿">绿</button>
    </div>
    <div class="filter-group">
      <button class="filter-btn" data-group="material" data-value="纯棉">纯棉</button>
      <button class="filter-btn" data-group="material" data-value="棉麻混纺">棉麻</button>
    </div>
  </div>
</div>

<!-- Fabric Grid -->
<div class="fabric-grid" id="fabricGrid"></div>

<!-- Contact -->
<div class="content">
  <div class="contact-section">
    <div class="contact-title">找不到想要的布？</div>
    <div class="contact-sub">联系我们 · 定制咨询</div>
    <div class="contact-buttons">
      <a class="contact-btn btn-wechat" href="#">💬 微信咨询</a>
      <a class="contact-btn btn-xhs" href="#">📕 小红书</a>
    </div>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  <div class="brand-footer">Chez Moi</div>
  <div>手织老土布 · 每一块都有故事</div>
</div>

<script src="js/app.js"></script>
<script>initIndexPage();</script>
</body>
</html>
